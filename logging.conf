[loggers]
keys=root

[handlers]
keys=consoleHandler
# keys=consoleHandler,fileHandler_DEBUG
# keys=consoleHandler,fileHandler_DEBUG,fileHandler_INFO

[formatters]
# keys=simpleFormatter1
keys=simpleFormatter1,simpleFormatter2

[logger_root]
level=DEBUG
handlers=consoleHandler
# handlers=consoleHandler,fileHandler_DEBUG,fileHandler_INFO

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
# level=INFO
# level=WARNING
formatter=simpleFormatter1
# formatter=simpleFormatter2
args=(sys.stdout,)

# write log file
[handler_fileHandler_DEBUG]
class=FileHandler
level=DEBUG
# formatter=simpleFormatter2
formatter=simpleFormatter1
args=('rootDEBUG.log','w')
# args=('rootDEBUG.log','a')

[handler_fileHandler_INFO]
class=FileHandler
level=INFO
formatter=simpleFormatter2
args=('rootINFO.log','w')

[formatter_simpleFormatter1]
format=[%(levelname)s] [%(name)s] [%(funcName)s] [%(lineno)d]- %(message)s
datefmt= 
# [formatter_simpleFormatter1]
# format=[%(levelname)s] [%(name)s] - %(message)s
# datefmt= 

[formatter_simpleFormatter2]
format=%(asctime)s [%(levelname)s] [%(name)s] [%(funcName)s] - %(message)s
datefmt= %Y-%m-%d %H:%M:%S